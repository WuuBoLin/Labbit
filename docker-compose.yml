services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped
    ports:
      - ${HOST_PORT:-8080}:80
    environment:
      APP_ENV: ${APP_ENV:-prod}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}
      DB_URL: /data/labbit.db
    volumes:
      - sqlite_bp:/data
volumes:
  sqlite_bp:
